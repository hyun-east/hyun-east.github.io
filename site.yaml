about:
  text: >
    I am an undergraduate researcher at the Intelligent Systems and Learning (ISL) Lab at DGIST, advised by Prof. Daehee Park. 
    My research lies at the intersection of physical AI and human motion—I study how humans move and interact with the world, 
    and how that understanding can inform robot control and embodied intelligence. 
    My work spans human motion modeling, egocentric perception of hand–object interaction, and learning robot policies inspired by human behavior.
    Alongside research, I serve as a teaching assistant and contribute to student leadership at DGIST.

research:
  - title: "Trajectory Planning / Prediction"
    description: "Prediction and planning for vehicles, human motion, and interaction-aware trajectories."
  - title: "Computer Vision"
    description: "Egocentric vision, depth prediction, super-resolution, and visual representation learning."
  - title: "Robotics & Embodied AI"
    description: "Perception-driven systems for real-world robotic intelligence."

