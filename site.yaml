about:
  text: >
    I am an undergraduate researcher at the Intelligent Systems and Learning (ISL) Lab at DGIST,
    working at the intersection of artificial intelligence, computer vision, and robotics.
    My research focuses on human-centered intelligent systems, with interests spanning perception,
    prediction, and learning-based decision-making. Alongside research, I have been involved in
    academic service, mentoring, and student leadership, with a continued interest in building
    technology that connects rigorous theory to practical impact.

research:
  - title: "Trajectory Planning / Prediction"
    description: "Prediction and planning for vehicles, human motion, and interaction-aware trajectories."
  - title: "Computer Vision"
    description: "Egocentric vision, depth prediction, super-resolution, and visual representation learning."
  - title: "Robotics & Embodied AI"
    description: "Perception-driven systems for real-world robotic intelligence."

