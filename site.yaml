about:
  text: >
    I am an undergraduate student at DGIST and an undergraduate researcher at the Intelligent Systems and Learning (ISL) Lab, advised by Prof. Daehee Park. I am honored to be a recipient of the DGIST Presidential Fellowship and the National Presidential Science Scholarship. My research interests lie in physical AI, egocentric perception, hand–object interaction, and human-inspired robot policy learning.
  links:
    - text: "Intelligent Systems and Learning (ISL) Lab"
      url: "https://isldgist.github.io"
    - text: "Prof. Daehee Park"
      url: "https://sites.google.com/view/dhpark/"

