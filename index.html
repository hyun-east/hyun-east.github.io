<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Hyeondong Kim">
    <meta name="description" content="Academic homepage of Hyeondong Kim.">

    <title>Hyeondong Kim</title>

    <link rel="stylesheet" type="text/css" href="styles.css">
  </head>

  <body>
    <main>
      <table class="page-table">
        <tbody>
          <tr>
            <td>
              <table class="intro-table">
                <tbody>
                  <tr>
                    <td class="intro-copy">
                      <p class="name" id="name">Hyeondong Kim</p>
                      <p class="role-line" id="roleLine"></p>
                      <p id="bioText"></p>
                      <p class="center links" id="heroLinks"></p>
                    </td>
                    <td class="intro-photo" id="portraitContainer"></td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="newsSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>News</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="newsList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="educationSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Education</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="educationList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="researchSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Research</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="researchList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="publicationsSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Publications</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content" id="publicationsList"></td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="experienceSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Experience</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="experienceList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="fellowshipsSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Fellowships</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="fellowshipsList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="awardsSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Awards</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <table class="list-table" id="awardsList"></table>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="section-table" id="contactSection">
                <tbody>
                  <tr>
                    <td class="section-heading">
                      <h2>Contact</h2>
                    </td>
                  </tr>
                  <tr>
                    <td class="section-content">
                      <p id="contactEmail"></p>
                    </td>
                  </tr>
                </tbody>
              </table>

              <table class="footer-table">
                <tbody>
                  <tr>
                    <td>
                      <p id="footerText"></p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </td>
          </tr>
        </tbody>
      </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
      function escapeHtml(str = '') {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setText(id, text) {
        const el = document.getElementById(id);
        if (el) el.textContent = text || '';
      }

      function setHtml(id, html) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = html || '';
      }

      function linkAttributes(href = '') {
        return /^https?:\/\//.test(href) ? ' target="_blank" rel="noopener"' : '';
      }

      function renderLinks(items = []) {
        return items
          .filter(item => item && item.label)
          .map((item, index) => {
          const label = escapeHtml(item.label || '');
          const href = escapeHtml(item.url || '');
          const attrs = linkAttributes(item.url || '');
          const sep = index > 0 ? ' &nbsp;/&nbsp; ' : '';
          const link = href
            ? `<a href="${href}"${attrs}>${label}</a>`
            : `<span class="pending-link">${label}</span>`;
          return `${sep}${link}`;
        }).join('');
      }

      function renderItemLinks(items = []) {
        if (!items.some(item => item && item.label)) return '';
        return `<br>${renderLinks(items)}`;
      }

      function linkifyText(text = '', links = []) {
        const source = String(text);
        const ranges = [];
        const candidates = links
          .filter(link => link && link.text && link.url)
          .sort((a, b) => b.text.length - a.text.length);

        function overlaps(start, end) {
          return ranges.some(range => start < range.end && end > range.start);
        }

        candidates.forEach(link => {
          let offset = 0;
          while (offset < source.length) {
            const start = source.indexOf(link.text, offset);
            if (start === -1) break;

            const end = start + link.text.length;
            if (!overlaps(start, end)) {
              ranges.push({ start, end, link });
            }
            offset = end;
          }
        });

        ranges.sort((a, b) => a.start - b.start);

        let html = '';
        let cursor = 0;
        ranges.forEach(range => {
          html += escapeHtml(source.slice(cursor, range.start));
          html += `<a href="${escapeHtml(range.link.url)}"${linkAttributes(range.link.url)}>${escapeHtml(source.slice(range.start, range.end))}</a>`;
          cursor = range.end;
        });
        html += escapeHtml(source.slice(cursor));

        return html;
      }

      function renderPortraitFallback(name = '') {
        const initials = name
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map(part => part[0])
          .join('')
          .toUpperCase() || 'HK';

        return `<div class="portrait-fallback" aria-label="Portrait placeholder">${escapeHtml(initials)}</div>`;
      }

      function renderPortrait(profile = {}) {
        const root = document.getElementById('portraitContainer');
        const src = profile.portrait?.src;
        const alt = profile.portrait?.alt || `Portrait of ${profile.name || 'Hyeondong Kim'}`;

        if (!src) {
          root.innerHTML = renderPortraitFallback(profile.name);
          return;
        }

        const img = new Image();
        img.onload = () => {
          root.innerHTML = `
            <a href="${escapeHtml(src)}">
              <img class="portrait" src="${escapeHtml(src)}" alt="${escapeHtml(alt)}">
            </a>
          `;
        };
        img.onerror = () => {
          root.innerHTML = renderPortraitFallback(profile.name);
        };
        img.src = src;
      }

      function renderDatedRows(rootId, items = [], renderBody) {
        const root = document.getElementById(rootId);
        const rows = items.map(item => `
          <tr>
            <td class="date-cell">${escapeHtml(item.date || item.period || '')}</td>
            <td class="item-cell">${renderBody(item)}</td>
          </tr>
        `).join('');

        root.innerHTML = `<tbody>${rows}</tbody>`;
      }

      function renderNews(items = []) {
        const section = document.getElementById('newsSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        renderDatedRows('newsList', items, item => {
          const text = escapeHtml(item.text || '');
          if (!item.url) return text;
          return `<a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${text}</a>`;
        });
      }

      function renderEducation(items = []) {
        const section = document.getElementById('educationSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        renderDatedRows('educationList', items, item => `
          <span class="item-title">${escapeHtml(item.degree || item.title || '')}</span>
          ${item.institution ? `<br>${escapeHtml(item.institution)}` : ''}
          ${item.description ? `<br><span class="muted">${escapeHtml(item.description)}</span>` : ''}
        `);
      }

      function renderResearch(items = []) {
        const section = document.getElementById('researchSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        const root = document.getElementById('researchList');
        root.innerHTML = `
          <tbody>
            ${items.map(item => `
              <tr>
                <td class="compact-cell">
                  <span class="item-title">${escapeHtml(item.title || '')}</span>
                  ${item.description ? `<br>${escapeHtml(item.description)}` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        `;
      }

      const myNames = ['Hyeondong Kim', 'H. Kim'];

      function highlightName(authors = '') {
        let result = authors;
        myNames.forEach(name => {
          const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          result = result.replace(new RegExp(`\\b${escaped}\\b`, 'g'), `<strong>${name}</strong>`);
        });
        return result;
      }

      function renderPublicationMedia(item = {}) {
        const image = item.image || {};
        const placeholder = escapeHtml(image.placeholder || 'Image');

        if (!image.src) {
          return `<div class="paper-placeholder">${placeholder}</div>`;
        }

        return `
          <div class="paper-image-wrap">
            <img
              class="paper-image"
              src="${escapeHtml(image.src)}"
              alt="${escapeHtml(image.alt || item.title || 'Publication image')}"
              onerror="this.classList.add('hidden'); this.nextElementSibling.classList.remove('hidden');"
            >
            <div class="paper-placeholder hidden">${placeholder}</div>
          </div>
        `;
      }

      function renderPublicationItem(item = {}) {
        return `
          <tr>
            <td class="paper-media">
              ${renderPublicationMedia(item)}
            </td>
            <td class="paper-cell">
              <span class="papertitle">${escapeHtml(item.title || '')}</span>
              <br>
              ${highlightName(escapeHtml(item.authors || ''))}
              <br>
              <em>${escapeHtml(item.venue || '')}</em>
              ${renderItemLinks(item.links || [])}
            </td>
          </tr>
        `;
      }

      function renderPublicationCategory(title, items = []) {
        if (!items.length) return '';
        return `
          <table class="list-table publication-table">
            <tbody>
              <tr>
                <td class="category-heading">${escapeHtml(title)}</td>
              </tr>
              ${items.map(renderPublicationItem).join('')}
            </tbody>
          </table>
        `;
      }

      function renderPublications(publications = {}) {
        const root = document.getElementById('publicationsList');
        const section = document.getElementById('publicationsSection');

        if (Array.isArray(publications)) {
          if (!publications.length) section.classList.add('hidden');
          root.innerHTML = renderPublicationCategory('', publications);
          return;
        }

        const html = `
          ${renderPublicationCategory('International', publications.international || [])}
          ${renderPublicationCategory('Domestic', publications.domestic || [])}
        `;

        root.innerHTML = html;
        if (!html.trim()) section.classList.add('hidden');
      }

      function renderTags(tags = []) {
        if (!tags.length) return '';
        return `<br><span class="muted">${tags.map(escapeHtml).join(' / ')}</span>`;
      }

      function renderExperience(items = []) {
        const section = document.getElementById('experienceSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        renderDatedRows('experienceList', items, item => `
          <span class="item-title">${escapeHtml(item.title || '')}</span>
          ${item.organization ? `<br>${escapeHtml(item.organization)}` : ''}
          ${item.description ? `<br><span class="muted">${escapeHtml(item.description)}</span>` : ''}
        `);
      }

      function renderFellowships(items = []) {
        const section = document.getElementById('fellowshipsSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        renderDatedRows('fellowshipsList', items, item => `
          <span class="item-title">${escapeHtml(item.title || '')}</span>
          ${item.description ? `<br><span class="muted">${escapeHtml(item.description)}</span>` : ''}
        `);
      }

      function renderAwards(items = []) {
        const section = document.getElementById('awardsSection');
        if (!items.length) {
          section.classList.add('hidden');
          return;
        }

        renderDatedRows('awardsList', items, item => `
          <span class="item-title">${escapeHtml(item.title || '')}</span>
          ${item.description ? `<br><span class="muted">${escapeHtml(item.description)}</span>` : ''}
        `);
      }

      async function loadData() {
        const res = await fetch('site.yaml', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load site.yaml');
        const yamlText = await res.text();
        return jsyaml.load(yamlText);
      }

      async function init() {
        try {
          const data = await loadData();
          const profile = data.profile || {};

          document.title = data.site?.title || profile.name || 'Hyeondong Kim';

          setText('name', profile.name || '');
          setHtml(
            'roleLine',
            [profile.subtitle, profile.affiliation].filter(Boolean).map(escapeHtml).join('<br>')
          );
          setHtml('bioText', linkifyText(data.about?.text || '', data.about?.links || []));
          setText('contactEmail', data.contact?.email || '');
          setText('footerText', data.footer?.text || '');

          document.getElementById('heroLinks').innerHTML = renderLinks(profile.links || []);

          renderPortrait(profile);
          renderNews(data.news || []);
          renderEducation(data.education || []);
          renderResearch(data.research || []);
          renderPublications(data.publications || {});
          renderExperience(data.experience || []);
          renderFellowships(data.fellowships || []);
          renderAwards(data.awards || []);
        } catch (err) {
          console.error(err);
          document.body.innerHTML = `
            <main>
              <table class="page-table">
                <tbody>
                  <tr>
                    <td class="section-content">
                      <p class="name">Failed to load site.yaml</p>
                      <p>Serve this folder over a local web server so the page can read <code>site.yaml</code>.</p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </main>
          `;
        }
      }

      init();
    </script>
  </body>
</html>
