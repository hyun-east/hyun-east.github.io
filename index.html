<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hyeondong Kim</title>
  <meta name="description" content="Academic homepage of Hyeondong Kim." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --text:#111111;
    --body:#2d2d33;
    --muted:#70707a;
    --line:#ececf1;
    --accent:#6d45ff;
    --accent-soft:#f4f0ff;
    --max:960px;
  }

  *{box-sizing:border-box}

  html{scroll-behavior:smooth;}

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
      "Inter", "Helvetica Neue", Arial, sans-serif;
    line-height:1.58;
    letter-spacing:-0.018em;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  a{
    color:inherit;
    text-decoration:none;
  }

  a:hover{
    text-decoration:none;
  }

  .wrap{
    max-width:var(--max);
    margin:0 auto;
    padding:0 28px;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(18px) saturate(170%);
    border-bottom:1px solid var(--line);
  }

  .nav{
    min-height:62px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:28px;
  }

  .brand{
    font-size:15px;
    font-weight:750;
    letter-spacing:-0.02em;
    white-space:nowrap;
  }

  nav{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
  }

  nav a{
    font-size:14px;
    font-weight:650;
    color:var(--muted);
    transition:color .14s ease;
  }

  nav a:hover{
    color:var(--accent);
  }

  main{
    padding:52px 0 76px;
  }

  .hero{
    display:grid;
    grid-template-columns:176px 1fr;
    gap:44px;
    align-items:center;
    padding:4px 0 50px;
    border-bottom:1px solid var(--line);
  }

  .portrait{
    width:176px;
    height:222px;
    object-fit:cover;
    display:block;
    background:#f5f5f7;
    border-radius:18px;
  }

  .portrait.placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:13px;
    background:#f5f5f7;
  }

  h1{
    font-size:50px;
    line-height:1.04;
    margin:0 0 12px;
    font-weight:820;
    letter-spacing:-0.055em;
  }

  .subtitle{
    font-size:19px;
    line-height:1.38;
    color:#25252b;
    margin:0 0 5px;
    font-weight:650;
    letter-spacing:-0.028em;
  }

  .affiliation{
    font-size:15.5px;
    color:var(--muted);
    margin:0 0 14px;
    font-weight:500;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:13px;
  }

  .chip{
    font-size:12.5px;
    line-height:1.35;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:999px;
    padding:4px 9px;
    font-weight:700;
  }

  .links{
    display:flex;
    flex-wrap:wrap;
    gap:8px 18px;
    margin-top:15px;
  }

  .links a{
    position:relative;
    font-size:14px;
    font-weight:760;
    color:var(--accent);
    letter-spacing:-0.018em;
    transition:color .14s ease;
  }

  .links a::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:-3px;
    height:2px;
    border-radius:999px;
    background:var(--accent);
    opacity:0;
    transform:scaleX(.45);
    transform-origin:left;
    transition:opacity .14s ease, transform .14s ease;
  }

  .links a:hover{
    color:#4f2ed8;
  }

  .links a:hover::after{
    opacity:1;
    transform:scaleX(1);
  }

  section{
    padding:34px 0;
  }

  section + section{
    border-top:1px solid var(--line);
  }

  h2{
    font-size:24px;
    line-height:1.18;
    margin:0 0 20px;
    font-weight:820;
    letter-spacing:.01em;
    text-transform:uppercase;
    color:var(--text);
  }

  h2::before{
    content:"";
    display:inline-block;
    width:8px;
    height:8px;
    margin-right:10px;
    border-radius:2px;
    background:var(--accent);
    transform:translateY(-2px);
  }

  h3{
    font-size:17.5px;
    line-height:1.36;
    margin:0 0 4px;
    font-weight:760;
    color:var(--text);
    letter-spacing:-0.025em;
  }

  p{
    margin:0 0 7px;
    color:var(--body);
  }

  .lead{
    font-size:16.5px;
    max-width:820px;
    color:var(--body);
  }

  .grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px 52px;
  }

  .card{
    background:transparent;
    border:none;
    padding:0;
  }

  .pub,
  .item{
    margin-bottom:22px;
    max-width:860px;
  }

  .pub:last-child,
  .item:last-child{
    margin-bottom:0;
  }

  .pub-category{
    margin-bottom:28px;
  }

  .pub-category:last-child{
    margin-bottom:0;
  }

  .pub-category-title{
    font-size:18px;
    line-height:1.3;
    margin:0 0 14px;
    font-weight:800;
    color:var(--accent);
    letter-spacing:-0.025em;
  }

  .meta{
    color:var(--muted);
    font-size:14px;
    font-weight:500;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-top:8px;
  }

  .tag{
    font-size:12px;
    color:var(--accent);
    background:var(--accent-soft);
    padding:3px 8px;
    border-radius:999px;
    font-weight:700;
  }

  .timeline{
    display:grid;
    gap:20px;
  }

  .timeline-item{
    display:grid;
    grid-template-columns:145px 1fr;
    gap:28px;
    align-items:start;
  }

  .time{
    color:var(--muted);
    font-size:13.5px;
    padding-top:2px;
    font-weight:650;
  }

  footer{
    color:var(--muted);
    font-size:13px;
    padding:28px 0 48px;
    border-top:1px solid var(--line);
  }

  .note{
    margin-top:12px;
    font-size:13px;
    color:var(--muted);
  }

  .hidden{display:none;}

  @media (max-width: 760px){
    main{
      padding-top:36px;
    }

    .hero{
      grid-template-columns:1fr;
      gap:24px;
      padding-bottom:40px;
    }

    .portrait,
    .portrait.placeholder{
      width:148px;
      height:188px;
      border-radius:16px;
    }

    nav{
      display:none;
    }

    h1{
      font-size:40px;
    }

    h2{
      font-size:21px;
    }

    .grid-2{
      grid-template-columns:1fr;
      gap:20px;
    }

    .timeline-item{
      grid-template-columns:1fr;
      gap:4px;
    }

    section{
      padding:30px 0;
    }
  }
</style>
</head>

<body>
  <header>
    <div class="wrap nav-bar">
      <div class="brand" id="brandName">Hyeondong Kim</div>
      <nav aria-label="Primary navigation">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#honors">Scholarships</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero" id="home">
      <div class="hero-text">
        <h1 id="name"></h1>
        <p class="subtitle" id="subtitle"></p>
        <p class="affiliation" id="affiliation"></p>
        <div class="chips" id="badges"></div>
        <div class="hero-links" id="heroLinks"></div>
      </div>
      <div id="portraitContainer"></div>
    </section>

    <section id="about">
      <h2>About</h2>
      <div class="card">
        <p class="lead" id="aboutText"></p>
      </div>
    </section>

    <section id="research">
      <h2>Research Interests</h2>
      <div class="grid-2" id="researchGrid"></div>
    </section>

    <section id="publications">
      <h2>Publications</h2>
      <div id="publicationsList"></div>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div id="projectsList"></div>
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <div class="timeline" id="experienceList"></div>
    </section>

    <section id="honors">
      <h2>Fellowships &amp; Scholarships</h2>
      <div class="grid-2" id="honorsGrid"></div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <div class="card">
        <p id="contactEmail"></p>
      </div>
    </section>

    <p class="note" id="yamlNote"></p>
  </main>

  <footer>
    <div class="wrap">
      <span id="footerText"></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script>
    function escapeHtml(str='') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderLinks(items = []) {
      return items.map(item => {
        const label = escapeHtml(item.label || '');
        const href = escapeHtml(item.url || '#');
        const external = !href.startsWith('mailto:') && !href.startsWith('#');
        const extra = external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${href}"${extra}>${label}</a>`;
      }).join('');
    }

    function renderTags(items = []) {
      return items.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text || '';
    }

    async function loadData() {
      const res = await fetch('site.yaml', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load site.yaml');
      const yamlText = await res.text();
      return jsyaml.load(yamlText);
    }

    function renderPortrait(profile = {}) {
      const wrap = document.getElementById('portraitContainer');
      if (profile.portrait && profile.portrait.src) {
        wrap.innerHTML = `
          <img class="portrait"
            src="${escapeHtml(profile.portrait.src)}"
            alt="${escapeHtml(profile.portrait.alt || 'Portrait')}" />`;
      } else {
        wrap.innerHTML = `<div class="portrait placeholder">Portrait</div>`;
      }
    }

    function renderResearch(items = []) {
      document.getElementById('researchGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
        </div>
      `).join('');
    }

    function renderPublicationItem(item = {}) {
      return `
        <div class="card pub">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.authors || '')}</p>
          <p class="meta"><em>${escapeHtml(item.venue || '')}</em></p>
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>`;
    }

    function renderPublicationCategory(title, items = []) {
      if (!items || !items.length) return '';
      return `
        <div class="pub-category">
          <div class="pub-category-title">${escapeHtml(title)}</div>
          ${items.map(renderPublicationItem).join('')}
        </div>`;
    }

    function renderPublications(publications = {}) {
      const root = document.getElementById('publicationsList');
      if (!Array.isArray(publications)) {
        root.innerHTML = `
          ${renderPublicationCategory('International', publications.international || [])}
          ${renderPublicationCategory('Domestic', publications.domestic || [])}`;
        return;
      }
      root.innerHTML = publications.map(renderPublicationItem).join('');
    }

    function renderProjects(items = []) {
      document.getElementById('projectsList').innerHTML = items.map(item => `
        <div class="card item">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
          ${item.tags && item.tags.length ? `<div class="tags">${renderTags(item.tags)}</div>` : ''}
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderExperience(items = []) {
      document.getElementById('experienceList').innerHTML = items.map(item => `
        <div class="timeline-item">
          <div class="time">${escapeHtml(item.period || '')}</div>
          <div class="card">
            <h3>${escapeHtml(item.title || '')}</h3>
            ${item.organization ? `<p>${escapeHtml(item.organization)}</p>` : ''}
            ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderHonors(items = []) {
      document.getElementById('honorsGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p class="meta">${escapeHtml(item.period || '')}</p>
        </div>
      `).join('');
    }

    /* ── Scroll reveal ── */
    function initScrollReveal() {
      const sections = document.querySelectorAll('section:not(.hero)');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.animationPlayState = 'running';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });

      sections.forEach(s => {
        s.style.animationPlayState = 'paused';
        observer.observe(s);
      });
    }

    async function init() {
      try {
        const data = await loadData();

        document.title = data.site?.title || 'Hyeondong Kim';

        setText('brandName', data.profile?.name || '');
        setText('name', data.profile?.name || '');
        setText('subtitle', data.profile?.subtitle || '');
        setText('affiliation', data.profile?.affiliation || '');
        setText('aboutText', data.about?.text || '');
        setText('contactEmail', data.contact?.email || '');
        setText('footerText', data.footer?.text || '');

        renderPortrait(data.profile || {});

        document.getElementById('badges').innerHTML = (data.profile?.badges || [])
          .map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('');

        document.getElementById('heroLinks').innerHTML =
          renderLinks(data.profile?.links || []);

        renderResearch(data.research || []);
        renderPublications(data.publications || {});
        renderProjects(data.projects || []);
        renderExperience(data.experience || []);
        renderHonors(data.honors || []);

        initScrollReveal();

      } catch (err) {
        console.error(err);
        document.body.innerHTML = `
          <main class="wrap" style="padding:80px 32px;">
            <h1 style="font-family:var(--serif);font-size:36px;font-weight:400;">
              Failed to load site.yaml
            </h1>
            <p style="margin-top:12px;color:var(--muted);">
              Make sure <code>site.yaml</code> exists in the same folder as
              <code>index.html</code>.
            </p>
          </main>`;
      }
    }

    init();
  </script>
</body>
</html>
