<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hyeondong Kim</title>
  <meta name="description" content="Academic homepage of Hyeondong Kim." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1e;
      --muted: #7a7a85;
      --faint: #f5f5f7;
      --line: #ebebef;
      --accent: #1a1a1e;
      --accent-soft: #f0f0f2;
      --max: 1060px;
      --serif: 'Instrument Serif', Georgia, 'Times New Roman', serif;
      --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.65;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--text);
      text-decoration: none;
      transition: opacity .15s;
    }
    a:hover { opacity: .55; }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .brand {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0;
    }

    nav { display: flex; gap: 28px; }

    nav a {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .01em;
      transition: color .15s;
    }
    nav a:hover { color: var(--text); opacity: 1; text-decoration: none; }

    /* ── Hero ── */
    .hero {
      padding: 80px 0 72px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 48px;
      align-items: end;
    }

    .hero-text { max-width: 720px; }

    h1 {
      font-family: var(--serif);
      font-size: 72px;
      line-height: 1.0;
      font-weight: 400;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      color: var(--text);
    }

    .subtitle {
      font-size: 18px;
      color: #3a3a42;
      font-weight: 400;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .affiliation {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }

    .chip {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 100px;
      letter-spacing: .02em;
    }

    .hero-links { display: flex; flex-wrap: wrap; gap: 20px; }

    .hero-links a {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1.5px solid var(--text);
      padding-bottom: 1px;
      transition: opacity .15s;
    }
    .hero-links a:hover { opacity: .45; }

    .portrait {
      width: 180px;
      height: 224px;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      background: var(--faint);
    }

    .portrait.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      background: var(--faint);
    }

    /* ── Sections ── */
    section {
      padding: 56px 0;
    }
    section + section {
      border-top: 1px solid var(--line);
    }

    h2 {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
      color: var(--text);
    }

    h3 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 6px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    p { margin-bottom: 8px; }

    .lead {
      font-size: 16px;
      max-width: 680px;
      color: #3a3a42;
      line-height: 1.72;
    }

    /* ── Grid ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 56px;
    }

    .card { padding: 0; }

    .card p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Publications ── */
    .pub, .item { margin-bottom: 32px; max-width: 780px; }
    .pub:last-child, .item:last-child { margin-bottom: 0; }

    .pub-category { margin-bottom: 40px; }
    .pub-category:last-child { margin-bottom: 0; }

    .pub-category-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .pub p { font-size: 14px; color: var(--muted); }

    .meta { color: var(--muted); font-size: 14px; }

    .links { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }

    .links a {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--line);
      padding-bottom: 1px;
    }
    .links a:hover { opacity: .5; }

    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

    .tag {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: var(--faint);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: .02em;
    }

    /* ── Timeline ── */
    .timeline { display: grid; gap: 28px; }

    .timeline-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 32px;
      align-items: start;
    }

    .time {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      padding-top: 3px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--line);
      padding: 28px 0 56px;
      color: var(--muted);
      font-size: 13px;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-text { animation: fadeUp .6s ease-out both; }
    .hero #portraitContainer { animation: fadeUp .6s ease-out .15s both; }

    section {
      opacity: 0;
      animation: fadeUp .5s ease-out both;
    }
    #about { animation-delay: .25s; }
    #research { animation-delay: .05s; }
    #publications { animation-delay: .05s; }
    #projects { animation-delay: .05s; }
    #experience { animation-delay: .05s; }
    #honors { animation-delay: .05s; }
    #contact { animation-delay: .05s; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 52px 0 48px;
        gap: 28px;
      }
      .hero-text { order: 2; }
      #portraitContainer { order: 1; }

      .portrait, .portrait.placeholder {
        width: 140px;
        height: 174px;
      }

      h1 { font-size: 48px; margin-bottom: 18px; }
      h2 { font-size: 26px; margin-bottom: 24px; }

      section { padding: 40px 0; }

      .grid-2 { grid-template-columns: 1fr; gap: 20px; }

      .timeline-item {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      nav { display: none; }

      .wrap { padding: 0 20px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap nav-bar">
      <div class="brand" id="brandName">Hyeondong Kim</div>
      <nav aria-label="Primary navigation">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#honors">Scholarships</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero" id="home">
      <div class="hero-text">
        <h1 id="name"></h1>
        <p class="subtitle" id="subtitle"></p>
        <p class="affiliation" id="affiliation"></p>
        <div class="chips" id="badges"></div>
        <div class="hero-links" id="heroLinks"></div>
      </div>
      <div id="portraitContainer"></div>
    </section>

    <section id="about">
      <h2>About</h2>
      <div class="card">
        <p class="lead" id="aboutText"></p>
      </div>
    </section>

    <section id="research">
      <h2>Research Interests</h2>
      <div class="grid-2" id="researchGrid"></div>
    </section>

    <section id="publications">
      <h2>Publications</h2>
      <div id="publicationsList"></div>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div id="projectsList"></div>
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <div class="timeline" id="experienceList"></div>
    </section>

    <section id="honors">
      <h2>Fellowships &amp; Scholarships</h2>
      <div class="grid-2" id="honorsGrid"></div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <div class="card">
        <p id="contactEmail"></p>
      </div>
    </section>

    <p class="note" id="yamlNote"></p>
  </main>

  <footer>
    <div class="wrap">
      <span id="footerText"></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script>
    function escapeHtml(str='') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderLinks(items = []) {
      return items.map(item => {
        const label = escapeHtml(item.label || '');
        const href = escapeHtml(item.url || '#');
        const external = !href.startsWith('mailto:') && !href.startsWith('#');
        const extra = external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${href}"${extra}>${label}</a>`;
      }).join('');
    }

    function renderTags(items = []) {
      return items.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text || '';
    }

    async function loadData() {
      const res = await fetch('site.yaml', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load site.yaml');
      const yamlText = await res.text();
      return jsyaml.load(yamlText);
    }

    function renderPortrait(profile = {}) {
      const wrap = document.getElementById('portraitContainer');
      if (profile.portrait && profile.portrait.src) {
        wrap.innerHTML = `
          <img class="portrait"
            src="${escapeHtml(profile.portrait.src)}"
            alt="${escapeHtml(profile.portrait.alt || 'Portrait')}" />`;
      } else {
        wrap.innerHTML = `<div class="portrait placeholder">Portrait</div>`;
      }
    }

    function renderResearch(items = []) {
      document.getElementById('researchGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
        </div>
      `).join('');
    }

    function renderPublicationItem(item = {}) {
      return `
        <div class="card pub">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.authors || '')}</p>
          <p class="meta"><em>${escapeHtml(item.venue || '')}</em></p>
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>`;
    }

    function renderPublicationCategory(title, items = []) {
      if (!items || !items.length) return '';
      return `
        <div class="pub-category">
          <div class="pub-category-title">${escapeHtml(title)}</div>
          ${items.map(renderPublicationItem).join('')}
        </div>`;
    }

    function renderPublications(publications = {}) {
      const root = document.getElementById('publicationsList');
      if (!Array.isArray(publications)) {
        root.innerHTML = `
          ${renderPublicationCategory('International', publications.international || [])}
          ${renderPublicationCategory('Domestic', publications.domestic || [])}`;
        return;
      }
      root.innerHTML = publications.map(renderPublicationItem).join('');
    }

    function renderProjects(items = []) {
      document.getElementById('projectsList').innerHTML = items.map(item => `
        <div class="card item">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
          ${item.tags && item.tags.length ? `<div class="tags">${renderTags(item.tags)}</div>` : ''}
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderExperience(items = []) {
      document.getElementById('experienceList').innerHTML = items.map(item => `
        <div class="timeline-item">
          <div class="time">${escapeHtml(item.period || '')}</div>
          <div class="card">
            <h3>${escapeHtml(item.title || '')}</h3>
            ${item.organization ? `<p>${escapeHtml(item.organization)}</p>` : ''}
            ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderHonors(items = []) {
      document.getElementById('honorsGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p class="meta">${escapeHtml(item.period || '')}</p>
        </div>
      `).join('');
    }

    /* ── Scroll reveal ── */
    function initScrollReveal() {
      const sections = document.querySelectorAll('section:not(.hero)');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.animationPlayState = 'running';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });

      sections.forEach(s => {
        s.style.animationPlayState = 'paused';
        observer.observe(s);
      });
    }

    async function init() {
      try {
        const data = await loadData();

        document.title = data.site?.title || 'Hyeondong Kim';

        setText('brandName', data.profile?.name || '');
        setText('name', data.profile?.name || '');
        setText('subtitle', data.profile?.subtitle || '');
        setText('affiliation', data.profile?.affiliation || '');
        setText('aboutText', data.about?.text || '');
        setText('contactEmail', data.contact?.email || '');
        setText('footerText', data.footer?.text || '');

        renderPortrait(data.profile || {});

        document.getElementById('badges').innerHTML = (data.profile?.badges || [])
          .map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('');

        document.getElementById('heroLinks').innerHTML =
          renderLinks(data.profile?.links || []);

        renderResearch(data.research || []);
        renderPublications(data.publications || {});
        renderProjects(data.projects || []);
        renderExperience(data.experience || []);
        renderHonors(data.honors || []);

        initScrollReveal();

      } catch (err) {
        console.error(err);
        document.body.innerHTML = `
          <main class="wrap" style="padding:80px 32px;">
            <h1 style="font-family:var(--serif);font-size:36px;font-weight:400;">
              Failed to load site.yaml
            </h1>
            <p style="margin-top:12px;color:var(--muted);">
              Make sure <code>site.yaml</code> exists in the same folder as
              <code>index.html</code>.
            </p>
          </main>`;
      }
    }

    init();
  </script>
</body>
</html>
