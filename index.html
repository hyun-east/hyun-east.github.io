<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hyeondong Kim</title>
  <meta name="description" content="Academic homepage of Hyeondong Kim." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --text:#111111;
    --muted:#555555;
    --link:#5b4dff;
    --max:1080px;
  }

  *{box-sizing:border-box}

  html{scroll-behavior:smooth;}

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
      "Inter", "Helvetica Neue", Arial, sans-serif;
    font-size:18px;
    line-height:1.5;
    letter-spacing:-0.03em;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  a{
    color:var(--link);
    text-decoration:none;
    font-weight:500;
  }

  a:hover{
    color:#3326d9;
    text-decoration:none;
  }

  .wrap{
    max-width:var(--max);
    margin:0 auto;
    padding:0 56px;
  }

  header{
    display:none;
  }

  main{
    padding:72px 0 80px;
  }

  .hero{
    display:grid;
    grid-template-columns:minmax(0, 1fr) 320px;
    gap:70px;
    align-items:center;
    padding:0 0 64px;
  }

  #portraitContainer{
    grid-column:2;
    grid-row:1;
  }

  .hero > div:last-child{
    grid-column:1;
    grid-row:1;
  }

  .portrait{
    width:320px;
    height:320px;
    object-fit:cover;
    display:block;
    border-radius:50%;
    background:#f3f3f3;
  }

  .portrait.placeholder{
    width:320px;
    height:320px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:14px;
    border-radius:50%;
    background:#f3f3f3;
  }

  h1{
    font-size:42px;
    line-height:1.12;
    margin:0 0 28px;
    font-weight:720;
    letter-spacing:-0.055em;
    text-align:center;
  }

  .subtitle{
    font-size:19px;
    color:var(--text);
    margin:0 0 2px;
    font-weight:400;
  }

  .affiliation{
    font-size:19px;
    color:var(--text);
    margin:0 0 22px;
    font-weight:400;
  }

  .chips,
  .chip{
    display:none;
  }

  .links{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:0;
    margin-top:24px;
    font-size:18px;
  }

  .links a{
    color:var(--link);
    font-size:18px;
    font-weight:500;
  }

  .links a + a::before{
    content:"/";
    color:#222;
    margin:0 10px;
    font-weight:400;
  }

  section{
    padding:36px 0;
  }

  section + section{
    border-top:none;
  }

  h2{
    font-size:31px;
    line-height:1.2;
    margin:0 0 24px;
    font-weight:680;
    color:var(--text);
    letter-spacing:-0.055em;
    text-transform:none;
  }

  h2::before,
  h2::after{
    content:none;
  }

  h3{
    font-size:19px;
    line-height:1.25;
    margin:0 0 2px;
    font-weight:700;
    color:var(--text);
    letter-spacing:-0.035em;
  }

  p{
    margin:0 0 12px;
    color:var(--text);
  }

  .lead{
    font-size:19px;
    max-width:none;
    color:var(--text);
  }

  .card{
    background:transparent;
    border:none;
    padding:0;
  }

  .grid-2{
    display:block;
  }

  .grid-2 .card{
    margin-bottom:24px;
  }

  .grid-2 .card:last-child{
    margin-bottom:0;
  }

  .pub,
  .item{
    margin-bottom:44px;
    max-width:none;
  }

  .pub:last-child,
  .item:last-child{
    margin-bottom:0;
  }

  .pub-category{
    margin-bottom:42px;
  }

  .pub-category:last-child{
    margin-bottom:0;
  }

  .pub-category-title{
    font-size:21px;
    line-height:1.25;
    margin:0 0 24px;
    font-weight:700;
    color:var(--text);
    letter-spacing:-0.04em;
  }

  .meta{
    color:var(--text);
    font-size:18px;
    font-weight:500;
  }

  .meta em{
    font-style:italic;
    font-weight:600;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:0;
    margin-top:4px;
  }

  .tag{
    font-size:16px;
    color:var(--muted);
    background:transparent;
    padding:0;
    border-radius:0;
    font-weight:400;
  }

  .tag + .tag::before{
    content:", ";
    color:var(--muted);
  }

  .timeline{
    display:grid;
    gap:28px;
  }

  .timeline-item{
    display:grid;
    grid-template-columns:180px 1fr;
    gap:36px;
    align-items:start;
  }

  .time{
    color:var(--muted);
    font-size:17px;
    padding-top:1px;
    font-weight:400;
  }

  footer{
    color:var(--muted);
    font-size:15px;
    padding:24px 0 48px;
  }

  .note{
    margin-top:8px;
    font-size:15px;
    color:var(--muted);
  }

  .hidden{display:none;}

  @media (max-width: 860px){
    .wrap{
      padding:0 28px;
    }

    main{
      padding-top:44px;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:28px;
      padding-bottom:48px;
    }

    #portraitContainer{
      order:-1;
    }

    .portrait,
    .portrait.placeholder{
      width:210px;
      height:210px;
    }

    h1{
      text-align:left;
      font-size:38px;
      margin-bottom:20px;
    }

    .links{
      justify-content:flex-start;
    }

    .timeline-item{
      grid-template-columns:1fr;
      gap:2px;
    }

    body{
      font-size:17px;
    }

    .subtitle,
    .affiliation,
    .lead{
      font-size:17px;
    }

    h2{
      font-size:28px;
    }
  }
</style>
</head>

<body>
  <header>
    <div class="wrap nav-bar">
      <div class="brand" id="brandName">Hyeondong Kim</div>
      <nav aria-label="Primary navigation">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#honors">Scholarships</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero" id="home">
      <div class="hero-text">
        <h1 id="name"></h1>
        <p class="subtitle" id="subtitle"></p>
        <p class="affiliation" id="affiliation"></p>
        <div class="chips" id="badges"></div>
        <div class="hero-links" id="heroLinks"></div>
      </div>
      <div id="portraitContainer"></div>
    </section>

    <section id="about">
      <h2>About</h2>
      <div class="card">
        <p class="lead" id="aboutText"></p>
      </div>
    </section>

    <section id="research">
      <h2>Research Interests</h2>
      <div class="grid-2" id="researchGrid"></div>
    </section>

    <section id="publications">
      <h2>Publications</h2>
      <div id="publicationsList"></div>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div id="projectsList"></div>
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <div class="timeline" id="experienceList"></div>
    </section>

    <section id="honors">
      <h2>Fellowships &amp; Scholarships</h2>
      <div class="grid-2" id="honorsGrid"></div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <div class="card">
        <p id="contactEmail"></p>
      </div>
    </section>

    <p class="note" id="yamlNote"></p>
  </main>

  <footer>
    <div class="wrap">
      <span id="footerText"></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <script>
    function escapeHtml(str='') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderLinks(items = []) {
      return items.map(item => {
        const label = escapeHtml(item.label || '');
        const href = escapeHtml(item.url || '#');
        const external = !href.startsWith('mailto:') && !href.startsWith('#');
        const extra = external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${href}"${extra}>${label}</a>`;
      }).join('');
    }

    function renderTags(items = []) {
      return items.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text || '';
    }

    async function loadData() {
      const res = await fetch('site.yaml', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load site.yaml');
      const yamlText = await res.text();
      return jsyaml.load(yamlText);
    }

    function renderPortrait(profile = {}) {
      const wrap = document.getElementById('portraitContainer');
      if (profile.portrait && profile.portrait.src) {
        wrap.innerHTML = `
          <img class="portrait"
            src="${escapeHtml(profile.portrait.src)}"
            alt="${escapeHtml(profile.portrait.alt || 'Portrait')}" />`;
      } else {
        wrap.innerHTML = `<div class="portrait placeholder">Portrait</div>`;
      }
    }

    function renderResearch(items = []) {
      document.getElementById('researchGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
        </div>
      `).join('');
    }

    function renderPublicationItem(item = {}) {
      return `
        <div class="card pub">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.authors || '')}</p>
          <p class="meta"><em>${escapeHtml(item.venue || '')}</em></p>
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>`;
    }

    function renderPublicationCategory(title, items = []) {
      if (!items || !items.length) return '';
      return `
        <div class="pub-category">
          <div class="pub-category-title">${escapeHtml(title)}</div>
          ${items.map(renderPublicationItem).join('')}
        </div>`;
    }

    function renderPublications(publications = {}) {
      const root = document.getElementById('publicationsList');
      if (!Array.isArray(publications)) {
        root.innerHTML = `
          ${renderPublicationCategory('International', publications.international || [])}
          ${renderPublicationCategory('Domestic', publications.domestic || [])}`;
        return;
      }
      root.innerHTML = publications.map(renderPublicationItem).join('');
    }

    function renderProjects(items = []) {
      document.getElementById('projectsList').innerHTML = items.map(item => `
        <div class="card item">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
          ${item.tags && item.tags.length ? `<div class="tags">${renderTags(item.tags)}</div>` : ''}
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderExperience(items = []) {
      document.getElementById('experienceList').innerHTML = items.map(item => `
        <div class="timeline-item">
          <div class="time">${escapeHtml(item.period || '')}</div>
          <div class="card">
            <h3>${escapeHtml(item.title || '')}</h3>
            ${item.organization ? `<p>${escapeHtml(item.organization)}</p>` : ''}
            ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderHonors(items = []) {
      document.getElementById('honorsGrid').innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p class="meta">${escapeHtml(item.period || '')}</p>
        </div>
      `).join('');
    }

    /* ── Scroll reveal ── */
    function initScrollReveal() {
      const sections = document.querySelectorAll('section:not(.hero)');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.animationPlayState = 'running';
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });

      sections.forEach(s => {
        s.style.animationPlayState = 'paused';
        observer.observe(s);
      });
    }

    async function init() {
      try {
        const data = await loadData();

        document.title = data.site?.title || 'Hyeondong Kim';

        setText('brandName', data.profile?.name || '');
        setText('name', data.profile?.name || '');
        setText('subtitle', data.profile?.subtitle || '');
        setText('affiliation', data.profile?.affiliation || '');
        setText('aboutText', data.about?.text || '');
        setText('contactEmail', data.contact?.email || '');
        setText('footerText', data.footer?.text || '');

        renderPortrait(data.profile || {});

        document.getElementById('badges').innerHTML = (data.profile?.badges || [])
          .map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('');

        document.getElementById('heroLinks').innerHTML =
          renderLinks(data.profile?.links || []);

        renderResearch(data.research || []);
        renderPublications(data.publications || {});
        renderProjects(data.projects || []);
        renderExperience(data.experience || []);
        renderHonors(data.honors || []);

        initScrollReveal();

      } catch (err) {
        console.error(err);
        document.body.innerHTML = `
          <main class="wrap" style="padding:80px 32px;">
            <h1 style="font-family:var(--serif);font-size:36px;font-weight:400;">
              Failed to load site.yaml
            </h1>
            <p style="margin-top:12px;color:var(--muted);">
              Make sure <code>site.yaml</code> exists in the same folder as
              <code>index.html</code>.
            </p>
          </main>`;
      }
    }

    init();
  </script>
</body>
</html>
