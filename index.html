<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hyeondong Kim</title>
  <meta name="description" content="Academic homepage of Hyeondong Kim." />
  <style>
    :root{
      --bg:#fbfbfa;
      --paper:#ffffff;
      --text:#1c1c1c;
      --muted:#666;
      --line:#e6e3dd;
      --accent:#1f4b7a;
      --max:960px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: Georgia, "Times New Roman", serif;
      line-height:1.68;
    }
    a{color:var(--accent); text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:var(--max); margin:0 auto; padding:0 24px}
    header{
      border-bottom:1px solid var(--line);
      background:rgba(251,251,250,.92);
      backdrop-filter:saturate(180%) blur(8px);
      position:sticky; top:0; z-index:10;
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      gap:24px; min-height:64px;
    }
    .brand{
      font-size:15px; letter-spacing:.08em; text-transform:uppercase; color:var(--text);
      white-space:nowrap;
    }
    nav{display:flex; flex-wrap:wrap; gap:18px}
    nav a{font-size:14px; color:var(--muted)}
    main{padding:40px 0 72px}
    .hero{
      display:grid; grid-template-columns:180px 1fr; gap:32px;
      padding:18px 0 26px; align-items:start;
      border-bottom:1px solid var(--line);
    }
    .portrait{
      width:180px; height:220px; border:1px solid var(--line); background:#f1efe9;
      object-fit:cover; display:block;
    }
    .portrait.placeholder{
      display:flex; align-items:center; justify-content:center; color:var(--muted);
      font-size:13px; letter-spacing:.04em;
    }
    h1{font-size:38px; margin:0 0 8px; font-weight:600}
    .subtitle{font-size:18px; color:#2f2f2f; margin:0 0 10px}
    .affiliation{font-size:16px; color:var(--muted); margin:0 0 18px}
    .links{display:flex; flex-wrap:wrap; gap:14px 18px; margin-top:18px}
    .links a{font-size:14px}
    .chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
    .chip{
      border:1px solid var(--line); padding:4px 10px; font-size:12px;
      color:#444; background:var(--paper);
    }
    section{
      padding:34px 0;
      border-bottom:1px solid var(--line);
    }
    section:last-of-type{border-bottom:none}
    h2{
      font-size:24px; font-weight:600; margin:0 0 18px;
      letter-spacing:.01em;
    }
    h3{font-size:18px; margin:0 0 8px; font-weight:600}
    p{margin:0 0 12px}
    .lead{font-size:17px}
    .grid-2{
      display:grid; grid-template-columns:1fr 1fr; gap:18px 24px;
    }
    .card{
      background:var(--paper);
      border:1px solid var(--line);
      padding:18px 18px 16px;
    }
    .pub, .item{margin-bottom:18px}
    .pub:last-child, .item:last-child{margin-bottom:0}
    .meta{color:var(--muted); font-size:14px}
    .tags{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
    .tag{
      font-size:12px; color:#555; border:1px solid var(--line);
      padding:2px 8px; background:#fcfcfb;
    }
    .timeline{display:grid; gap:14px}
    .timeline-item{
      display:grid; grid-template-columns:170px 1fr; gap:18px;
      align-items:start;
    }
    .time{color:var(--muted); font-size:14px; padding-top:2px}
    footer{
      color:var(--muted);
      font-size:13px;
      padding:28px 0 50px;
      border-top:1px solid var(--line);
    }
    .note{
      margin-top:14px; font-size:13px; color:var(--muted);
    }
    .hidden{display:none}
    @media (max-width: 760px){
      .hero{grid-template-columns:1fr}
      .portrait,.portrait.placeholder{width:140px;height:180px}
      .timeline-item{grid-template-columns:1fr}
      .grid-2{grid-template-columns:1fr}
      nav{display:none}
      h1{font-size:32px}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <div class="brand" id="brandName">Hyeondong Kim</div>
      <nav aria-label="Primary navigation">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#honors">Scholarships</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero" id="home">
      <div id="portraitContainer"></div>
      <div>
        <h1 id="name"></h1>
        <p class="subtitle" id="subtitle"></p>
        <p class="affiliation" id="affiliation"></p>
        <div class="chips" id="badges"></div>
        <div class="links" id="heroLinks"></div>
      </div>
    </section>

    <section id="about">
      <h2>About</h2>
      <div class="card">
        <p class="lead" id="aboutText"></p>
      </div>
    </section>

    <section id="research">
      <h2>Research Interests</h2>
      <div class="grid-2" id="researchGrid"></div>
    </section>

    <section id="publications">
      <h2>Publications</h2>
      <div id="publicationsList"></div>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div id="projectsList"></div>
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <div class="timeline" id="experienceList"></div>
    </section>

    <section id="honors">
      <h2>Fellowships & Scholarships</h2>
      <div class="grid-2" id="honorsGrid"></div>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <div class="card">
        <p id="contactEmail"></p>
      </div>
    </section>

    <p class="note" id="yamlNote"></p>
  </main>

  <footer>
    <div class="wrap">
      <span id="footerText"></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script>
    function escapeHtml(str='') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderLinks(items = []) {
      return items.map(item => {
        const label = escapeHtml(item.label || '');
        const href = escapeHtml(item.url || '#');
        const external = !href.startsWith('mailto:') && !href.startsWith('#');
        const extra = external ? ' target="_blank" rel="noopener"' : '';
        return `<a href="${href}"${extra}>${label}</a>`;
      }).join('');
    }

    function renderTags(items = []) {
      return items.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text || '';
    }

    async function loadData() {
      const res = await fetch('site.yaml', { cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to load site.yaml');
      const yamlText = await res.text();
      return jsyaml.load(yamlText);
    }

    function renderPortrait(profile = {}) {
      const wrap = document.getElementById('portraitContainer');
      if (profile.portrait && profile.portrait.src) {
        wrap.innerHTML = `<img class="portrait" src="${escapeHtml(profile.portrait.src)}" alt="${escapeHtml(profile.portrait.alt || 'Portrait')}" />`;
      } else {
        wrap.innerHTML = `<div class="portrait placeholder">Portrait</div>`;
      }
    }

    function renderResearch(items = []) {
      const root = document.getElementById('researchGrid');
      root.innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
        </div>
      `).join('');
    }

    function renderPublications(items = []) {
      const root = document.getElementById('publicationsList');
      root.innerHTML = items.map(item => `
        <div class="card pub">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.authors || '')}</p>
          <p class="meta"><em>${escapeHtml(item.venue || '')}</em></p>
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderProjects(items = []) {
      const root = document.getElementById('projectsList');
      root.innerHTML = items.map(item => `
        <div class="card item">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p>${escapeHtml(item.description || '')}</p>
          ${item.tags && item.tags.length ? `<div class="tags">${renderTags(item.tags)}</div>` : ''}
          ${item.links && item.links.length ? `<div class="links">${renderLinks(item.links)}</div>` : ''}
        </div>
      `).join('');
    }

    function renderExperience(items = []) {
      const root = document.getElementById('experienceList');
      root.innerHTML = items.map(item => `
        <div class="timeline-item">
          <div class="time">${escapeHtml(item.period || '')}</div>
          <div class="card">
            <h3>${escapeHtml(item.title || '')}</h3>
            ${item.organization ? `<p>${escapeHtml(item.organization)}</p>` : ''}
            ${item.description ? `<p>${escapeHtml(item.description)}</p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderHonors(items = []) {
      const root = document.getElementById('honorsGrid');
      root.innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.title || '')}</h3>
          <p class="meta">${escapeHtml(item.period || '')}</p>
        </div>
      `).join('');
    }

    async function init() {
      try {
        const data = await loadData();

        document.title = data.site?.title || 'Hyeondong Kim';
        setText('brandName', data.profile?.name || '');
        setText('name', data.profile?.name || '');
        setText('subtitle', data.profile?.subtitle || '');
        setText('affiliation', data.profile?.affiliation || '');
        setText('aboutText', data.about?.text || '');
        setText('contactEmail', data.contact?.email || '');
        setText('yamlNote', data.site?.yaml_note || 'Edit site.yaml to update the contents of this page.');
        setText('footerText', data.footer?.text || '');

        renderPortrait(data.profile || {});

        const badges = document.getElementById('badges');
        badges.innerHTML = (data.profile?.badges || []).map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('');
        document.getElementById('heroLinks').innerHTML = renderLinks(data.profile?.links || []);

        renderResearch(data.research || []);
        renderPublications(data.publications || []);
        renderProjects(data.projects || []);
        renderExperience(data.experience || []);
        renderHonors(data.honors || []);
      } catch (err) {
        console.error(err);
        document.body.innerHTML = '<main class="wrap" style="padding:48px 24px;"><h1>Failed to load site.yaml</h1><p>Make sure <code>site.yaml</code> exists in the same folder as <code>index.html</code>.</p></main>';
      }
    }

    init();
  </script>
</body>
</html>
